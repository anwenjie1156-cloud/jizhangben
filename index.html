<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人记账本</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; color: #2d3436; min-height: 100vh; }

/* ---- 顶部 ---- */
.header { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: #fff; padding: 20px 24px; }
.header h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.balance-cards { display: flex; gap: 12px; flex-wrap: wrap; }
.balance-card { background: rgba(255,255,255,.15); border-radius: 12px; padding: 12px 18px; min-width: 100px; }
.balance-card .label { font-size: 12px; opacity: .8; }
.balance-card .value { font-size: 22px; font-weight: 700; margin-top: 2px; }

/* ---- 主体 ---- */
.container { max-width: 800px; margin: 0 auto; padding: 20px; }

/* ---- 记账表单 ---- */
.form-card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.form-card h3 { font-size: 15px; margin-bottom: 14px; color: #636e72; }
.form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.form-row:last-child { margin-bottom: 0; }
.form-row input, .form-row select { flex: 1; min-width: 80px; padding: 10px 12px; border: 1px solid #dfe6e9; border-radius: 10px; font-size: 14px; outline: none; transition: border .2s; }
.form-row input:focus, .form-row select:focus { border-color: #6c5ce7; }
.type-btn { flex: 1; padding: 10px; border: 1px solid #dfe6e9; border-radius: 10px; font-size: 14px; cursor: pointer; text-align: center; transition: all .2s; background: #fff; }
.type-btn.expense.active { background: #ff7675; color: #fff; border-color: #ff7675; }
.type-btn.income.active { background: #00b894; color: #fff; border-color: #00b894; }
.submit-btn { padding: 10px 24px; background: #6c5ce7; color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 600; }

/* ---- 视图切换 ---- */
.view-tabs { display: flex; gap: 0; margin-bottom: 16px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.view-tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; cursor: pointer; border: none; background: #fff; color: #636e72; transition: all .2s; }
.view-tab.active { background: #6c5ce7; color: #fff; font-weight: 600; }

/* ---- 列表 ---- */
.list-card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.list-card h3 { font-size: 15px; margin-bottom: 14px; color: #636e72; }
.record-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f2f6; }
.record-item:last-child { border-bottom: none; }
.record-left { display: flex; align-items: center; gap: 10px; }
.cat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.record-info .note { font-size: 14px; font-weight: 500; }
.record-info .meta { font-size: 12px; color: #b2bec3; margin-top: 2px; }
.record-amount { font-size: 16px; font-weight: 700; }
.record-amount.expense { color: #ff7675; }
.record-amount.income { color: #00b894; }
.del-btn { background: none; border: none; color: #b2bec3; cursor: pointer; font-size: 16px; padding: 4px 8px; margin-left: 8px; }
.del-btn:hover { color: #ff7675; }

/* ---- 统计 ---- */
.stats-card { background: #fff; border-radius: 16px; padding: 20px; margin-top: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.stats-card h3 { font-size: 15px; margin-bottom: 14px; color: #636e72; }
.stats-row { display: flex; flex-wrap: wrap; gap: 10px; }
.cat-stat { background: #f8f9fa; border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; font-size: 13px; }
.cat-stat .dot { width: 10px; height: 10px; border-radius: 50%; }
.cat-stat .val { font-weight: 600; margin-left: auto; }
.bar-wrap { flex: 1; min-width: 200px; margin-top: 8px; }
.bar-row { display: flex; align-items: center; margin-bottom: 6px; gap: 8px; }
.bar-label { width: 60px; font-size: 12px; text-align: right; color: #636e72; }
.bar-track { flex: 1; height: 20px; background: #f1f2f6; border-radius: 10px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 10px; transition: width .4s; }
.bar-val { width: 80px; font-size: 12px; font-weight: 600; }

.empty-hint { text-align: center; color: #b2bec3; padding: 30px 0; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>💰 个人记账本</h1>
  <div class="balance-cards" id="balanceCards">
    <div class="balance-card"><div class="label">总收入</div><div class="value" id="totalIncome">¥0</div></div>
    <div class="balance-card"><div class="label">总支出</div><div class="value" id="totalExpense">¥0</div></div>
    <div class="balance-card"><div class="label">结余</div><div class="value" id="balance">¥0</div></div>
  </div>
</div>

<div class="container">

  <!-- 记账表单 -->
  <div class="form-card">
    <h3>✏️ 记一笔</h3>
    <div class="form-row">
      <button class="type-btn expense active" onclick="setType('expense',this)">📤 支出</button>
      <button class="type-btn income" onclick="setType('income',this)">📥 收入</button>
    </div>
    <div class="form-row">
      <input type="date" id="formDate">
      <select id="formCategory"></select>
      <input type="number" id="formAmount" placeholder="金额" step="0.01" min="0.01">
    </div>
    <div class="form-row">
      <input type="text" id="formNote" placeholder="备注（选填）" style="flex:3">
      <button class="submit-btn" onclick="addRecord()">记下</button>
    </div>
    <div id="editHint" style="display:none;font-size:12px;color:#6c5ce7;margin-top:8px">正在编辑记录，<a href="#" onclick="cancelEdit()">取消编辑</a></div>
  </div>

  <!-- 视图切换 -->
  <div class="view-tabs">
    <button class="view-tab active" onclick="switchView('day')">📅 日视图</button>
    <button class="view-tab" onclick="switchView('month')">📆 月视图</button>
    <button class="view-tab" onclick="switchView('year')">📈 年视图</button>
  </div>

  <!-- 日期导航 -->
  <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px">
    <button onclick="navigate(-1)" style="background:#fff;border:1px solid #dfe6e9;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:14px">◀</button>
    <span id="dateLabel" style="font-weight:600;font-size:16px"></span>
    <button onclick="navigate(1)" style="background:#fff;border:1px solid #dfe6e9;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:14px">▶</button>
    <button onclick="navigate(0)" style="background:#6c5ce7;color:#fff;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:14px">今天</button>
  </div>

  <!-- 记录列表 -->
  <div class="list-card" id="listCard"><h3 id="listTitle">📋 账单明细</h3><div id="recordList" class="empty-hint">暂无记录</div></div>

  <!-- 统计 -->
  <div class="stats-card" id="statsCard"><h3>📊 分类统计</h3><div id="statsArea" class="empty-hint">暂无数据</div></div>

</div>

<script>
// ====== 数据定义 ======
const EXPENSE_CATS = [
  { id:'food', name:'🍔 餐饮', color:'#ff7675' },
  { id:'transport', name:'🚗 交通', color:'#fdcb6e' },
  { id:'shopping', name:'🛍 购物', color:'#e17055' },
  { id:'entertainment', name:'🎮 娱乐', color:'#a29bfe' },
  { id:'housing', name:'🏠 住房', color:'#636e72' },
  { id:'health', name:'💊 医疗', color:'#fd79a8' },
  { id:'education', name:'📚 学习', color:'#00cec9' },
  { id:'digital', name:'📱 数码', color:'#6c5ce7' },
  { id:'beauty', name:'💄 美容', color:'#e84393' },
  { id:'pet', name:'🐾 宠物', color:'#fab1a0' },
  { id:'gift', name:'🎁 人情', color:'#ffeaa7' },
  { id:'other_e', name:'📌 其他支出', color:'#b2bec3' }
];

const INCOME_CATS = [
  { id:'salary', name:'💼 工资', color:'#00b894' },
  { id:'bonus', name:'🧧 奖金', color:'#55efc4' },
  { id:'investment', name:'📈 投资', color:'#00cec9' },
  { id:'parttime', name:'🔧 兼职', color:'#81ecec' },
  { id:'refund', name:'↩️ 退款', color:'#74b9ff' },
  { id:'other_i', name:'📌 其他收入', color:'#a29bfe' }
];

// ====== 状态 ======
let records = JSON.parse(localStorage.getItem('jizhang_records') || '[]');
let currentView = 'day';
let currentDate = new Date();
let currentType = 'expense';
let editingId = null;

// ====== 初始化 ======
function init() {
  document.getElementById('formDate').value = toDateStr(new Date());
  renderCategorySelect();
  setType('expense', document.querySelector('.type-btn.expense.active'));
  switchView('day');
}

function toDateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function toMonthStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function toYearStr(d) { return String(d.getFullYear()); }
function parseDate(s) { const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }

function save() { localStorage.setItem('jizhang_records', JSON.stringify(records)); }

// ====== 分类选择 ======
function renderCategorySelect() {
  const cats = currentType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  const sel = document.getElementById('formCategory');
  sel.innerHTML = cats.map(c => '<option value="'+c.id+'">'+c.name+'</option>').join('');
}

function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCategorySelect();
}

// ====== 添加/编辑记录 ======
function addRecord() {
  const date = document.getElementById('formDate').value;
  const category = document.getElementById('formCategory').value;
  const amount = parseFloat(document.getElementById('formAmount').value);
  const note = document.getElementById('formNote').value.trim();

  if (!date || !amount || amount <= 0) { alert('请填写日期和金额'); return; }

  if (editingId !== null) {
    const idx = records.findIndex(r => r.id === editingId);
    if (idx !== -1) { records[idx].date = date; records[idx].category = category; records[idx].amount = amount; records[idx].type = currentType; records[idx].note = note; }
    editingId = null;
    document.getElementById('editHint').style.display = 'none';
  } else {
    records.push({ id: Date.now(), date, category, amount, type: currentType, note });
  }

  records.sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id);
  save();
  clearForm();
  renderAll();
}

function clearForm() {
  document.getElementById('formDate').value = toDateStr(new Date());
  document.getElementById('formAmount').value = '';
  document.getElementById('formNote').value = '';
  editingId = null;
  document.getElementById('editHint').style.display = 'none';
  setType('expense', document.querySelector('.type-btn.expense'));
}

function editRecord(id) {
  const r = records.find(r => r.id === id);
  if (!r) return;
  document.getElementById('formDate').value = r.date;
  document.getElementById('formAmount').value = r.amount;
  document.getElementById('formNote').value = r.note || '';
  editingId = r.id;
  document.getElementById('editHint').style.display = 'block';
  setType(r.type, document.querySelector('.type-btn.' + r.type));
  setTimeout(() => {
    document.getElementById('formCategory').value = r.category;
  }, 50);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() { clearForm(); }

function deleteRecord(id) {
  if (!confirm('确定删除这条记录吗？')) return;
  records = records.filter(r => r.id !== id);
  save();
  renderAll();
}

// ====== 视图切换 ======
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view-tab').forEach(t => { if (t.textContent.includes(view==='day'?'日':view==='month'?'月':'年')) t.classList.add('active'); });
  currentDate = new Date();
  updateDateLabel();
  renderAll();
}

function navigate(dir) {
  if (dir === 0) { currentDate = new Date(); }
  else if (currentView === 'day') { currentDate.setDate(currentDate.getDate() + dir); }
  else if (currentView === 'month') { currentDate.setMonth(currentDate.getMonth() + dir); }
  else { currentDate.setFullYear(currentDate.getFullYear() + dir); }
  updateDateLabel();
  renderAll();
}

function updateDateLabel() {
  const el = document.getElementById('dateLabel');
  if (currentView === 'day') el.textContent = toDateStr(currentDate);
  else if (currentView === 'month') el.textContent = toMonthStr(currentDate);
  else el.textContent = toYearStr(currentDate);
}

// ====== 筛选 ======
function getFiltered() {
  if (currentView === 'day') {
    const ds = toDateStr(currentDate);
    return records.filter(r => r.date === ds);
  } else if (currentView === 'month') {
    const ms = toMonthStr(currentDate);
    return records.filter(r => r.date.startsWith(ms));
  } else {
    const ys = toYearStr(currentDate);
    return records.filter(r => r.date.startsWith(ys));
  }
}

// ====== 渲染 ======
function renderAll() {
  const filtered = getFiltered();
  renderSummary();
  renderList(filtered);
  renderStats(filtered);
}

function renderSummary() {
  const all = records;
  const totalIn = all.filter(r => r.type === 'income').reduce((s,r) => s + r.amount, 0);
  const totalEx = all.filter(r => r.type === 'expense').reduce((s,r) => s + r.amount, 0);
  document.getElementById('totalIncome').textContent = '¥' + totalIn.toFixed(2);
  document.getElementById('totalExpense').textContent = '¥' + totalEx.toFixed(2);
  document.getElementById('balance').textContent = '¥' + (totalIn - totalEx).toFixed(2);
}

function getCatInfo(id) {
  return [...EXPENSE_CATS, ...INCOME_CATS].find(c => c.id === id) || { name: id, color: '#b2bec3' };
}

function renderList(filtered) {
  const el = document.getElementById('recordList');
  document.getElementById('listTitle').textContent = currentView === 'day' ? '📋 当日流水' : currentView === 'month' ? '📋 当月流水' : '📋 当年流水';

  if (filtered.length === 0) { el.innerHTML = '<div class="empty-hint">暂无记录</div>'; return; }

  let subTotalEx = 0, subTotalIn = 0;
  let html = '';
  filtered.forEach(r => {
    const cat = getCatInfo(r.category);
    if (r.type === 'expense') subTotalEx += r.amount; else subTotalIn += r.amount;
    html += '<div class="record-item">'
      + '<div class="record-left">'
      + '<div class="cat-icon" style="background:'+cat.color+'20;color:'+cat.color+'">'+cat.name.slice(0,2)+'</div>'
      + '<div class="record-info">'
      + '<div class="note">'+(r.note || cat.name.slice(2))+'</div>'
      + '<div class="meta">'+r.date+' · '+cat.name.slice(2)+'</div>'
      + '</div></div>'
      + '<div style="display:flex;align-items:center">'
      + '<div class="record-amount '+r.type+'">'+(r.type==='income'?'+':'−')+'¥'+r.amount.toFixed(2)+'</div>'
      + '<button class="del-btn" title="编辑" onclick="editRecord('+r.id+')" style="margin-left:4px">✏️</button>'
      + '<button class="del-btn" onclick="deleteRecord('+r.id+')">🗑</button>'
      + '</div></div>';
  });
  html += '<div style="display:flex;justify-content:flex-end;gap:20px;padding-top:12px;font-size:13px;color:#636e72;border-top:2px solid #f1f2f6;margin-top:8px">'
    + '<span>📥 收入 ¥'+subTotalIn.toFixed(2)+'</span>'
    + '<span>📤 支出 ¥'+subTotalEx.toFixed(2)+'</span>'
    + '<span style="font-weight:700">合计 ¥'+(subTotalIn-subTotalEx).toFixed(2)+'</span></div>';
  el.innerHTML = html;
}

function renderStats(filtered) {
  const el = document.getElementById('statsArea');
  if (filtered.length === 0) { el.innerHTML = '<div class="empty-hint">暂无数据</div>'; return; }

  const catMap = {};
  filtered.forEach(r => {
    if (!catMap[r.category]) catMap[r.category] = { expense: 0, income: 0 };
    catMap[r.category][r.type] += r.amount;
  });

  const entries = Object.entries(catMap).map(([id, v]) => ({ id, ...v }));
  const maxVal = Math.max(...entries.map(e => e.expense + e.income), 1);

  let html = '';
  entries.forEach(e => {
    const cat = getCatInfo(e.id);
    const total = e.income - e.expense;
    html += '<div class="bar-row">'
      + '<div class="bar-label">'+cat.name.slice(2)+'</div>'
      + '<div class="bar-track">'
      + (e.expense > 0 ? '<div class="bar-fill" style="width:'+(e.expense/maxVal*100)+'%;background:'+cat.color+'"></div>' : '')
      + '</div>'
      + '<div class="bar-val" style="color:'+(total>=0?'#00b894':'#ff7675')+'">'+(total>=0?'+':'')+'¥'+Math.abs(total).toFixed(2)+'</div></div>';
  });
  el.innerHTML = html;
}

// ====== 启动 ======
init();
</script>
</body>
</html>
